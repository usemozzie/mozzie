name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ─── Windows ───────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/desktop
        run: pnpm tauri build --target x86_64-pc-windows-msvc

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe

  # ─── macOS (per-arch) ─────────────────────────────────────────────
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64

    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Step 0: Import certificate into a temporary keychain ──
      - name: Import Apple certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "actions" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list \
            -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          rm -f $CERTIFICATE_PATH

          # Verify the identity is available
          security find-identity -v -p codesigning $KEYCHAIN_PATH

      # ── Step 1: Build the .app (without Tauri signing — we sign manually) ──
      - name: Build Tauri app
        working-directory: apps/desktop
        run: pnpm tauri build --target ${{ matrix.target }} --bundles app

      # ── Step 2: Deep-sign the .app with hardened runtime ──
      - name: Codesign .app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          APP_PATH="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/Mozzie.app"

          echo "::group::Signing $APP_PATH"
          codesign \
            --deep \
            --force \
            --verify \
            --verbose \
            --options runtime \
            --sign "$APPLE_SIGNING_IDENTITY" \
            "$APP_PATH"
          echo "::endgroup::"

          echo "::group::Verify codesign"
          codesign --verify --deep --strict "$APP_PATH"
          echo "::endgroup::"

          echo "::group::Verify Gatekeeper"
          spctl -a -vv "$APP_PATH" || true
          echo "::endgroup::"

      # ── Step 3: Create zip with ditto (Apple-friendly) ──
      - name: Create notarization zip
        run: |
          APP_PATH="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/Mozzie.app"
          ZIP_PATH="$RUNNER_TEMP/Mozzie-${{ matrix.arch }}.zip"

          ditto -c -k --keepParent "$APP_PATH" "$ZIP_PATH"
          echo "ZIP_PATH=$ZIP_PATH" >> $GITHUB_ENV

      # ── Step 4: Notarize (submit + wait) ──
      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          echo "::group::Submit for notarization"
          xcrun notarytool submit "$ZIP_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          echo "::endgroup::"

      # ── Step 5: Staple the notarization ticket ──
      - name: Staple app
        run: |
          APP_PATH="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/Mozzie.app"
          xcrun stapler staple "$APP_PATH"

          echo "::group::Final Gatekeeper check"
          spctl -a -vv "$APP_PATH"
          echo "::endgroup::"

      # ── Step 6: Build DMG ──
      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          APP_PATH="apps/desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos/Mozzie.app"
          DMG_PATH="$RUNNER_TEMP/Mozzie_${{ github.ref_name }}_${{ matrix.arch }}.dmg"

          create-dmg \
            --volname "Mozzie" \
            --app-drop-link 600 185 \
            "$DMG_PATH" \
            "$APP_PATH" || true
          # create-dmg exits 2 on success when no background image is set

          if [ ! -f "$DMG_PATH" ]; then
            echo "::error::DMG was not created"
            exit 1
          fi

          echo "DMG_PATH=$DMG_PATH" >> $GITHUB_ENV

      # ── Step 7: Sign + notarize the DMG ──
      - name: Sign DMG
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG_PATH"
          codesign --verify "$DMG_PATH"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"

      # ── Upload ──
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: ${{ env.DMG_PATH }}

  # ─── Create GitHub Release ────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Mozzie ${{ github.ref_name }}" \
            --notes "See the [changelog](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details." \
            --draft \
            artifacts/**/*
